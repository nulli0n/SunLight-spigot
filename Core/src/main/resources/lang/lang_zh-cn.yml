  Warps:
    Command:
      Warps:
        Root:
          Desc: 传送点命令。
        Delete:
          Desc: 删除一个传送点。
        Create:
          Desc: 创建新传送点。
        Update:
          Desc: 更新传送点位置。
        Edit:
          Desc: 编辑一个传送点。
