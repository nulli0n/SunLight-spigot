      Warp:
        Jump:
          Notify:
            - '[title_times="20:60:20",sound="minecraft:entity.enderman.teleport;0.8;1.0",type="title"]'
            - <orange><b>%warp_name%</b></orange>
            - <gray>%warp_description%</gray>
          Feedback: <gray>你已将 <orange>%player_display_name%</orange> 传送到 <white>%warp_name%</white> 传送点</gray>
      Browser:
        Empty: <gray>没有可用的传送点</gray>
        Feedback: <gray>你已为 <orange>%player_display_name%</orange> 打开传送点 GUI</gray>
      Error:
        NoWarpPermission: '[sound="minecraft:entity.villager.no;0.8;1.0"]<gray>你没有访问 <red>%warp_name%</red> 传送点的权限</gray>'
        InactiveWarp: '[sound="minecraft:entity.villager.no;0.8;1.0"]<gray><red>%warp_name%</red> 当前不可用</gray>'
      Dialog:
        WarpName:
          Title: <yellow><b>传送点</b></yellow><dark_gray> » </dark_gray><white>名称</white>
          Body:
            Contents:
              - 请输入传送点的名称。
              - ''
              - 你可以点击 <click:open_url:"https://nightexpressdev.com/nightcore/configuration/text-formation/"><yellow><b>此处</b></yellow></click> 查看所有可用的格式标签和颜色代码。
            Width: 400
          Input:
            Name: <sprite:"items":"item/name_tag"> 名称
        WarpDescription:
          Title: <yellow><b>传送点</b></yellow><dark_gray> » </dark_gray><white>描述</white>
          Body:
            Contents:
              - 请输入传送点的描述。
              - ''
              - 你可以点击 <click:open_url:"https://nightexpressdev.com/nightcore/configuration/text-formation/"><yellow><b>此处</b></yellow></click> 查看所有可用的格式标签和颜色代码。
            Width: 400
          Input:
            Name: <sprite:"items":"item/writable_book"> 描述
        WarpCommand:
          Title: <yellow><b>传送点</b></yellow><dark_gray> » </dark_gray><white>命令</white>
          Body:
            Contents:
              - 输入一个 <yellow>命令</yellow> 以便快速访问此传送点。
              - ''
              - 此命令允许玩家快速传送到此传送点，无需提供额外参数。
              - ''
              - 要应用这些更改，我们 <red>强烈建议</red> 重启服务器。
              - 但是，你可以勾选 <orange>'重建命令'</orange> 框以“实时”应用更改，尽管可能会发生一些轻微的 <orange>副作用</orange>。
            Width: 400
          Input:
            Enabled: 启用
            Name: <sprite:"items":"item/command_block_minecart"> 命令
            Rebuild: 重建命令
        WarpSlots:
          Title: <yellow><b>传送点</b></yellow><dark_gray> » </dark_gray><white>槽位</white>
          Body:
            Contents:
              - 指定此传送点将在 GUI 中显示的 <yellow>槽位</yellow> 和 <yellow>页码</yellow>。
              - ''
              - 槽位编号从 <orange>0</orange> 开始，并用逗号分隔 <gray>(例如：1, 2, 10, 11)</gray>。
              - ''
              - GUI 页面的 <yellow>总数</yellow> 由分配给任何传送点的 <yellow>最高</yellow> 页码决定。
              - ''
              - 你可以将页码设置为 <red>0</red> 以在 GUI 中隐藏此传送点。
            Width: 400
          Input:
            Page: <sprite:"items":"item/paper"> 页面
            Name: <sprite:"items":"item/item_frame"> 槽位
    UI:
      WarpsMenu:
        WarpDefault:
          Name: '%warp_name%'
          Lore:
            - '%warp_description%'
            - '%empty-if-above%'
            - <gold>→ <u>点击传送</u></gold>
        WarpModerate:
          Name: '%warp_name%'
          Lore:
