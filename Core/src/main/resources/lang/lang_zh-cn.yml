# 装备装载点
EquipmentSlot:
  OFF_HAND: 副手
  BODY: 身体
  CHEST: 胸部
  HAND: 主手
  HEAD: 头部
  LEGS: 腿部
  FEET: 脚部
  SADDLE: 鞍
# 游戏模式
GameMode:
  CREATIVE: 创造模式
  ADVENTURE: 冒险模式
  SURVIVAL: 生存模式
  SPECTATOR: 旁观模式
# 方向
Direction:
  NORTH_EAST: 东北
  SOUTH_EAST: 东南
  EAST: 正东
  WEST: 正西
  NORTH: 正北
  SOUTH_WEST: 西南
  NORTH_WEST: 西北
  SOUTH: 正南
  HERE: 此处
# 指令
Command:
  Argument:
    Name:
      Slot: 槽位
      Enchant: 附魔
      Level: 等级
      Target: 目标
      Type: 类型
      Time: 时间
      Mode: 模式
      State: 状态
      IPAddress: IP
      Radius: 半径
      Text: 文本
      Command: 命令
      Position: 位置
      X: X
      Y: Y
      Z: Z
    ArgumentName:
      EntityType: 生物类型
      Owner: 所有者
    Syntax:
      InvalidEquipmentSlot: <gray><soft_red>%input%</soft_red> 不是一个有效的装备槽!</gray>
      InvalidInetAddress: <gray><soft_red>%input%</soft_red> 不是一个有效的内网地址!</gray>
      InvalidEntityType: <gray><soft_red>%input%</soft_red> 不是一个有效的生物类型!</gray>
      InvalidMobEffect: <gray><soft_red>%input%</soft_red> 不是一个有效的药水效果!</gray>
  Item:
    Root:
      Desc: 物品指令
      Amount:
        Desc: 更改物品的堆叠数量
        Done: '[sound="minecraft:entity.item.pickup;0.8;1.0"]<gray>你已将 <white>%item%</white> 的堆叠数量更改为 <soft_yellow>%amount%x</soft_yellow></gray>'
      Damage:
        Desc: 更改物品的耐久度
        Done: '[sound="minecraft:entity.item.break;0.8;1.0"]<gray>你已将 <white>%item%</white> 的耐久度设置为 <soft_yellow>%amount%</soft_yellow></gray>'
      Enchant:
        Desc: 为手持物品附魔
        Error:
          NotCompatible: '[sound="minecraft:entity.villager.no;0.8;1.0"]<gray><soft_red>%enchantment%</soft_red> 与 <white>%item%</white> 不兼容</gray>'
          Overpowered: '[sound="minecraft:entity.villager.no;0.8;1.0"]<gray><soft_red>%enchantment%</soft_red> 附魔等级上限为 <soft_red>%level%</soft_red></gray>'
        Done:
          Enchanted: '[sound="minecraft:block.enchantment_table.use;0.8;1.0"]<gray>你已为 <white>%item%</white> 打上 <soft_purple>%enchantment% %level%</soft_purple> 附魔</gray>'
      Disenchant:
        Desc: 移除手持物品的附魔
      Get:
        Desc: 从指定的玩家出获取指定数量的物品
        Done: '[sound="minecraft:entity.item.pickup;0.8;1.0"]<gray>你已从 <white>%player_display_name%</white> 处获取了 <white>%amount% x %item%</white></gray>'
      Give:
        Desc: 给予指定玩家物品
        Done: '[sound="minecraft:entity.item.pickup;0.8;1.0"]<gray>你已将 <white>%amount% x %item%</white> 给予了 <soft_yellow>%player_display_name%</soft_yellow></gray>'
        Notify: '[sound="minecraft:entity.item.pickup;0.8;1.0"]<gray>你已被给予 <white>%amount% x %item%</white></gray>'
      Lore:
        Root:
          Desc: 物品属性命令集
          Add:
            Desc: 为物品添加一行属性
            Done: '[sound="minecraft:block.anvil.use;0.8;1.0"]<gray>你已为 <white>%item%</white> 添加了属性 <white>%text%</white></gray>'
          Insert:
            Desc: 为手中的物品在指定位置插入一行属性
          Remove:
            Desc: 移除手中物品的一行属性
            Done: '[sound="minecraft:block.anvil.use;0.8;1.0"]<gray>你已从 <white>%item%</white> 的属性中移除了 <white>%text%</white></gray>'
          Clear:
            Desc: 清空手中物品的属性
            Done: '[sound="minecraft:block.anvil.use;0.8;1.0"]<gray>你已清空了 <white>%item%</white> 的属性</gray>'
      Model:
        Desc: 更改手中物品的模型数据 (显示的样子等)
        Done: '[sound="minecraft:block.anvil.use;0.8;1.0"]<gray>已将 <soft_yellow>%amount%</soft_yellow> 设置为 <soft_yellow>%item%</soft_yellow> 的样子!</gray>'
      Name:
        Desc: 重命名手中物品
        Done:
          Changed: '[sound="minecraft:block.anvil.use;0.8;1.0"]<gray>你已将 <white>%item%</white> 重命名为 <white>%name%</white></gray>'
      Potion:
        Add:
          Desc: 为药水添加一种效果
          Done: <gray>药水效果已添加!</gray>
      Repair:
        Desc: 修复手中的物品
        Done: '[sound="minecraft:block.anvil.use;0.8;1.0"]<gray>你已修复了 <white>%item%</white>!</gray>'
      Spawn:
        Desc: 在指定位置生成物品 (掉落物)
        Done: '[sound="minecraft:entity.item.pickup;0.8;1.0"]<gray>你已在 <red>%location_x%</red> <green>%location_y%</green> <blue>%location_z%</blue> @ <white>%location_world%</white> 生成 <white>%amount% x %item%</white></gray>'
      Unbreakable:
        Desc: 为手中物品设置不可破坏属性
        Done: '[sound="minecraft:block.anvil.use;0.8;1.0"]<gray>你已将 <white>%item%</white> 的不可破坏属性设置为 <white>%state%</white></gray>'
      Vanish:
        Desc: 切换隐身状态
        Notify: <lgray>隐身状态已设置为 <lyellow>%state%</lyellow></lgray>
        Target: <lgray>已将玩家 <lyellow>%player_display_name%</lyellow> 的隐身状态设置为 <lyellow>%state%</lyellow></lgray>
      Staff:
        Desc: 显示在线工作人员
        Empty: <gray>没有工作人员在线</gray>
  Air:
    Root:
      Desc: 氧气值设置
      Add:
        Desc: 增加氧气值
      Set:
        Desc: 设置氧气值
        Target: '<gray>你已将 <soft_yellow>%player_display_name%</soft_yellow> 的氧气值设置为 <yellow>%amount%</yellow>。当前氧气值：<soft_yellow>%current%</soft_yellow>/<soft_yellow>%max%</soft_yellow></gray>'
        Notify: '<gray>你的氧气值已设置为 <soft_yellow>%amount%</soft_yellow>: <soft_yellow>%current%</soft_yellow>/<soft_yellow>%max%</soft_yellow></gray>'
      Remove:
        Desc: 减少氧气值
      Give:
        Target: '<gray>你已为 <soft_yellow>%player_display_name%</soft_yellow> 增加了 <green>%amount%</green> 个氧气值。当前氧气值：<soft_yellow>%current%</soft_yellow>/<soft_yellow>%max%</soft_yellow></gray>'
        Notify: '<gray>你获得了 <soft_yellow>%amount%</soft_yellow> 个氧气值：<soft_yellow>%current%</soft_yellow>/<soft_yellow>%max%</soft_yellow></gray>'
      Take:
        Target: '<gray>你已从 <soft_yellow>%player_display_name%</soft_yellow> 处移除了 <red>%amount%</red> 个氧气值。当前氧气值：<soft_yellow>%current%</soft_yellow>/<soft_yellow>%max%</soft_yellow></gray>'
        Notify: '<gray>你失去了 <soft_yellow>%amount%</soft_yellow> 个氧气值：<soft_yellow>%current%</soft_yellow>/<soft_yellow>%max%</soft_yellow></gray>'
  Broadcast:
    Desc: 发布一则公告
  Condense:
    Desc: 将物品压缩为方块
    Error:
      Nothing: '[sound="minecraft:entity.villager.no;0.8;1.0"]<gray>没有可压缩的物品</gray>'
      NotEnough: <gray>没有足够的材料将 <red>%source%</red> 压缩为 <red>%result%</red>。至少需要 <red>%amount%</red> 个</gray>
    Done: <gray>已将 <soft_yellow>x%total% %source%</soft_yellow> 压缩为 <soft_yellow>x%amount% %result%</soft_yellow></gray>
  Dimension:
    Desc: 传送到一个维度
    Target: <gray>你已将玩家 <soft_yellow>%player_display_name%</soft_yellow> 传送到 <soft_yellow>%world%</soft_yellow></gray>
    Notify: '[sound="minecraft:entity.enderman.teleport;0.8;1.0"]<gray>你已传送到 <orange>%world%</orange></gray>'
  Disposal:
    Desc: 打开虚拟回收站。
    Target: <gray>你已为 <white>%player_display_name%</white> 打开了 <orange>虚拟回收站</orange></gray>
    Notify: <gray>你已打开了 <orange>虚拟回收站</orange></gray>
  Enchant:
    Desc: 附魔槽位中的物品。
    EmptySlot: <gray><white>%player_display_name%</white> 的 <soft_red>%slot%</soft_red> 槽位中没有物品</gray>
    Enchanted:
      Target: '[sound="minecraft:block.enchantment_table.use;0.8;1.0"]<gray>你已将 <white>%player_display_name%</white> 的 <white>%type%</white> 槽位中的 <white>%item%</white> 附魔为 <orange>%name% %amount%</orange></gray>'
      Notify: '[sound="minecraft:block.enchantment_table.use;0.8;1.0"]<gray>你的 <white>%item%</white> 已附魔为 <orange>%name% %amount%</orange></gray>'
    Disenchant:
      Desc: 移除槽位中物品的附魔。
      NotEnchanted: <gray><white>%player_display_name%</white> 的 <soft_red>%slot%</soft_red> 槽位中的 <soft_red>%item%</soft_red> 物品不包含要移除的 <soft_red>%enchantment%</soft_red> 附魔</gray>
      Specific:
        Target: '[sound="minecraft:block.grindstone.use;0.8;1.0"]<gray>你已从 <white>%player_display_name%</white> 的 <white>%type%</white> 槽位中的 <white>%item%</white> 移除了 <orange>%enchantment%</orange></gray>'
        Notify: '[sound="minecraft:block.grindstone.use;0.8;1.0"]<gray>你的 <white>%item%</white> 已移除附魔 <orange>%enchantment%</orange></gray>'
      All:
        Target: '[sound="minecraft:block.grindstone.use;0.8;1.0"]<gray>你已移除 <white>%player_display_name%</white> 的 <white>%type%</white> 槽位中 <white>%item%</white> 的所有附魔</gray>'
        Notify: '[sound="minecraft:block.grindstone.use;0.8;1.0"]<gray>你的 <white>%item%</white> 已移除所有附魔</gray>'
  Experience:
    Root:
      Desc: 经验值命令。
      AddLevel:
        Desc: 增加经验等级。
        Feedback: '[sound="minecraft:entity.player.levelup;0.8;1.0"]<gray>你已为 <white>%player_display_name%</white> 增加了 <soft_green>%value%</soft_green> 经验等级 (<yellow>%oldvalue%</yellow><dark_gray> → </dark_gray><green>%newvalue%</green>)</gray>'
        Notify: '[sound="minecraft:entity.player.levelup;0.8;1.0"]<gray>你获得了 <soft_green>%value%</soft_green> 经验等级</gray>'
      SetLevel:
        Desc: 设置经验等级。
        Feedback: '[sound="minecraft:entity.player.levelup;0.8;1.0"]<gray>你已将 <white>%player_display_name%</white> 的经验等级设置为 <soft_yellow>%value%</soft_yellow> (<yellow>%oldvalue%</yellow><dark_gray> → </dark_gray><green>%newvalue%</green>)</gray>'
        Notify: '[sound="minecraft:entity.player.levelup;0.8;1.0"]<gray>你的经验等级已设置为 <soft_yellow>%value%</soft_yellow></gray>'
      RemoveLevel:
        Desc: 移除经验等级。
        Feedback: '[sound="minecraft:entity.player.levelup;0.8;1.0"]<gray>你已从 <white>%player_display_name%</white> 处移除了 <soft_red>%value%</soft_red> 经验等级 (<yellow>%oldvalue%</yellow><dark_gray> → </dark_gray><green>%newvalue%</green>)</gray>'
        Notify: '[sound="minecraft:entity.player.levelup;0.8;1.0"]<gray>你被移除了 <soft_red>%value%</soft_red> 经验等级</gray>'
      AddXP:
        Desc: 增加经验值。
        Feedback: '[sound="minecraft:entity.experience_orb.pickup;0.8;1.0"]<gray>你已为 <white>%player_display_name%</white> 增加了 <soft_green>%value%</soft_green> 经验值 (<yellow>%oldvalue%</yellow><dark_gray> → </dark_gray><green>%newvalue%</green>)</gray>'
        Notify: '[sound="minecraft:entity.experience_orb.pickup;0.8;1.0"]<gray>你获得了 <soft_green>%value%</soft_green> 经验值</gray>'
      SetXP:
        Desc: 设置经验值。
        Feedback: '[sound="minecraft:entity.experience_orb.pickup;0.8;1.0"]<gray>你已将 <white>%player_display_name%</white> 的总经验值设置为 <soft_yellow>%value%</soft_yellow> (<yellow>%oldvalue%</yellow><dark_gray> → </dark_gray><green>%newvalue%</green>)</gray>'
        Notify: '[sound="minecraft:entity.experience_orb.pickup;0.8;1.0"]<gray>你的总经验值已设置为 <soft_yellow>%value%</soft_yellow></gray>'
      RemoveXP:
        Desc: 移除经验值。
        Feedback: '[sound="minecraft:entity.experience_orb.pickup;0.8;1.0"]<gray>你已从 <white>%player_display_name%</white> 处移除了 <soft_red>%value%</soft_red> 经验值 (<yellow>%oldvalue%</yellow><dark_gray> → </dark_gray><green>%newvalue%</green>)</gray>'
        Notify: '[sound="minecraft:entity.experience_orb.pickup;0.8;1.0"]<gray>你被移除了 <soft_red>%value%</soft_red> 经验值</gray>'
  Ignite:
    Desc: 点燃玩家。
    Feedback: '[sound="minecraft:entity.player.hurt_on_fire;0.8;1.0"]<gray>你已点燃 <white>%player_display_name%</white>，持续 <soft_yellow>%time%</soft_yellow></gray>'
    Notify: '[sound="minecraft:entity.player.hurt_on_fire;0.8;1.0"]<gray>你被点燃，持续 <soft_red>%time%</soft_red></gray>'
  Extinguish:
    Desc: 熄灭玩家。
    Feedback: '[sound="minecraft:block.fire.extinguish;0.8;1.0"]<gray>你已熄灭 <white>%player_display_name%</white></gray>'
    Notify: '[sound="minecraft:block.fire.extinguish;0.8;1.0"]<gray>你被熄灭</gray>'
  Fly:
    Root:
      Desc: 飞行命令。
      Toggle:
        Desc: 切换飞行。
        'On':
          Desc: 启用飞行。
        'Off':
          Desc: 禁用飞行。
        Target: '[sound="minecraft:item.firecharge.use;0.8;1.0"]<gray>你已将 <white>%player_display_name%</white> 的飞行设置为 <white>%state%</white></gray>'
        Notify: '[sound="minecraft:item.firecharge.use;0.8;1.0"]<gray>你的飞行已设置为 <white>%state%</white></gray>'
      FlySpeed:
        Desc: 更改飞行速度。
        Done:
          Notify: <gray>你的飞行速度已设置为 <soft_yellow>%amount%</soft_yellow></gray>
          Target: <gray>你已将 <white>%player_display_name%</white> 的飞行速度设置为 <soft_yellow>%amount%</soft_yellow></gray>
  Food:
    Root:
      Desc: 食物等级命令。
      Add:
        Desc: 增加食物值。
      Set:
        Desc: 设置食物等级。
        Target: <gray>你已将 <white>%player_display_name%</white> 的食物等级设置为 <yellow>%amount%</yellow> (<white>%oldvalue%</white><dark_gray> → </dark_gray><yellow>%newvalue%</yellow>)</gray>
        Notify: <gray>你的食物等级已设置为 <soft_yellow>%amount%</soft_yellow></gray>
      Remove:
        Desc: 减少食物值。
      Restore:
        Desc: 恢复食物等级。
        Notify: '[sound="minecraft:entity.generic.eat;0.8;1.0"]<gray>你已被喂食!</gray>'
        Info: '[sound="minecraft:entity.generic.eat;0.8;1.0"]<gray>你已喂食 <white>%player_display_name%</white></gray>'
      Give:
        Target: <gray>你已为 <white>%player_display_name%</white> <green>增加了 %amount%</green> 食物值 (<white>%oldvalue%</white><dark_gray> → </dark_gray><green>%newvalue%</green>)</gray>
        Notify: <gray>你的食物等级增加了 <soft_yellow>%amount%</soft_yellow></gray>
      Take:
        Target: <gray>你已从 <white>%player_display_name%</white> 处 <red>移除了 %amount%</red> 食物值 (<white>%oldvalue%</white><dark_gray> → </dark_gray><red>%newvalue%</red>)</gray>
        Notify: <gray>你的食物等级减少了 <soft_yellow>%amount%</soft_yellow></gray>
  ForceRun:
    Description: 强制玩家执行命令。
    Forced:
      Feedback: '<gray>你已强制 <white>%player_display_name%</white> 执行：<soft_yellow>%command%</soft_yellow></gray>'
      Immunity: <gray>玩家 <white>%player_display_name%</white> 对此命令免疫</gray>
  ForceSay:
    Description: 强制玩家说话。
    Forced:
      Feedback: '<gray>你已强制 <white>%player_display_name%</white> 说：<soft_yellow>%text%</soft_yellow></gray>'
      Immunity: <gray>玩家 <white>%player_display_name%</white> 对此命令免疫</gray>
  GameMode:
    Root:
      Desc: 游戏模式命令。
      Type:
        Desc: 设置游戏模式为 %type%。
        Notify: <gray>你的游戏模式已设置为 <soft_yellow>%type%</soft_yellow></gray>
        Target: <gray>你已将 <white>%player_display_name%</white> 的游戏模式设置为 <soft_yellow>%type%</soft_yellow></gray>
  Hat:
    Desc: 将物品戴在头上。
    Done: '[sound="minecraft:item.armor.equip_leather;0.8;1.0"]<gray>享受你的新帽子!</gray>'
    EmptyHand: '[sound="minecraft:entity.villager.no;0.8;1.0"]<gray>你必须手持物品才能装备!</gray>'
  Health:
    Root:
      Desc: 生命值命令。
      Add:
        Desc: 增加生命值。
        Target: '[sound="minecraft:entity.witch.drink;0.8;1.0"]<gray>你已 <green>治疗</green> <white>%player_display_name%</white> <green>%amount%❤</green> (<white>%oldvalue%❤</white><dark_gray> → </dark_gray><green>%newvalue%❤</green>)</gray>'
        Notify: '[sound="minecraft:entity.witch.drink;0.8;1.0"]<gray>你被 <green>治疗</green> 了 <green>%amount%❤</green></gray>'
      Set:
        Desc: 设置生命值。
        Target: '[sound="minecraft:entity.witch.drink;0.8;1.0"]<gray>你已将 <white>%player_display_name%</white> 的生命值设置为 <yellow>%amount%❤</yellow> (<white>%oldvalue%❤</white><dark_gray> → </dark_gray><red>%newvalue%❤</red>)</gray>'
        Notify: '[sound="minecraft:entity.witch.drink;0.8;1.0"]<gray>你的生命值已设置为 <yellow>%amount%❤</yellow></gray>'
      Remove:
        Desc: 减少生命值。
        Target: '[sound="minecraft:entity.player.hurt;0.8;1.0"]<gray>你已 <red>伤害</red> <white>%player_display_name%</white> <red>%amount%❤</red> (<white>%oldvalue%❤</white><dark_gray> → </dark_gray><red>%newvalue%❤</red>)</gray>'
        Notify: '[sound="minecraft:entity.player.hurt;0.8;1.0"]<gray>你被 <red>伤害</red> 了 <red>%amount%❤</red></gray>'
      Restore:
        Desc: 恢复玩家生命值或复活。
        Notfiy: '[sound="minecraft:entity.witch.drink;0.8;1.0"]<gray>你已完全治愈</gray>'
        Info: '[sound="minecraft:entity.witch.drink;0.8;1.0"]<gray>你已恢复 <white>%player_display_name%</white> 的生命值</gray>'
      Revive:
        Feedback: '[sound="minecraft:item.totem.use;0.8;1.0"]<gray>你已复活</gray>'
        Notify: '[sound="minecraft:item.totem.use;0.8;1.0"]<gray>你已复活 <white>%player_display_name%</white></gray>'
      TargetDead:
        Feedback: '[sound="minecraft:entity.villager.no;0.8;1.0"]<gray><white>%player_display_name%</white> 的生命值无法修改，因为他们已死亡</gray>'
        Notify: '[sound="minecraft:entity.villager.no;0.8;1.0"]<gray>你死亡时无法更改生命值</gray>'
  Near:
    Desc: 显示附近的玩家。
    Nothing:
      Notify: <gray><orange>%radius%</orange> 方块半径内没有玩家</gray>
      Feedback: <gray><white>%player_display_name%</white> 周围 <orange>%radius%</orange> 方块半径内没有玩家</gray>
  Nick:
    Root:
      Desc: 昵称命令。
      Clear:
        Desc: 移除自定义名称。
        Target: <gray>移除了 <soft_yellow>%player_display_name%</soft_yellow> 的自定义名称</gray>
        Notify: <gray>你的自定义名称已移除</gray>
      Set:
        Desc: 设置玩家自定义名称。
        Target: <gray>已将 <soft_yellow>%player_name%</soft_yellow> 的自定义名称设置为 <soft_yellow>%name%</soft_yellow></gray>
        Notify: '<gray>你获得了新的自定义名称：<soft_yellow>%name%</soft_yellow></gray>'
      Change:
        Desc: 设置自定义名称。
        Done: <gray>你已将自定义名称更改为 <soft_yellow>%name%</soft_yellow></gray>
        Error:
          BadWords: <soft_red>不允许使用此名称</soft_red>
          Regex: <soft_red>名称包含禁止字符</soft_red>
          TooLong: <gray>名称不能超过 <soft_red>%amount%</soft_red> 个字符</gray>
